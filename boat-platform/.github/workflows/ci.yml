name: ci

on:
  push:
    branches: [main, master, "release/*"]
  pull_request:
    branches: [main, master, "release/*"]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - name: Configure
        run: cmake --preset release
      - name: Build
        run: cmake --build --preset release
      - name: Test
        run: ctest --preset release
      - name: Fail fast when gateway artifact missing
        run: test -f build/release/src/gateway/grpc_gateway/boat_gateway

  python-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install ./sdk/python[dev]
          pip install ./cli
      - name: Run Python tests
        run: |
          TEST_PATHS="sdk/python/tests cli/tests"
          if [ -d "boat_ai/tests" ]; then
            TEST_PATHS="$TEST_PATHS boat_ai/tests"
          fi
          pytest $TEST_PATHS -v

  asan-build:
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - name: Configure and build with ASan
        run: cmake --preset asan && cmake --build --preset asan
      - name: Run ASan tests
        run: ctest --test-dir build/asan --output-on-failure

  coverage:
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain and gcovr
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++ gcovr
      - name: Configure and build with coverage
        run: cmake --preset coverage && cmake --build --preset coverage
      - name: Run coverage tests
        run: ctest --test-dir build/coverage
      - name: Generate coverage report
        run: gcovr --root . --exclude build/ --xml coverage.xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  tsan:
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - name: Configure and build with TSan
        run: cmake --preset tsan && cmake --build --preset tsan
      - name: Run TSan tests
        run: ctest --test-dir build/tsan --output-on-failure

  determinism-check:
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - name: Configure and build
        run: cmake --preset release && cmake --build --preset release
      - name: Run deterministic test
        run: ctest --preset release -R boat_determinism_seed

  docker-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and optionally push multi-arch runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.runtime
          push: ${{ github.event_name == 'push' }}
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/boat-platform/boat-platform:ci-${{ github.sha }}

  hil-smoke:
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain and CAN utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ can-utils linux-modules-extra-$(uname -r) || true
      - name: Load vcan kernel module
        run: |
          sudo modprobe vcan
          sudo ip link add dev vcan0 type vcan
          sudo ip link set up vcan0
      - name: Configure and build
        run: cmake --preset release && cmake --build --preset release
      - name: Run HIL smoke test
        env:
          BOAT_HIL_ENABLED: "1"
          BOAT_VCAN_IFACE: "vcan0"
        run: ctest --preset release -R boat_hil_smoke --output-on-failure
      - name: Teardown vcan
        if: always()
        run: sudo ip link delete vcan0 || true
