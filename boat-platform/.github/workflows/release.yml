name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  package:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++ rpm
      - name: Configure + build
        run: cmake --preset release && cmake --build --preset release
      - name: Create package
        run: cd build/release && cpack -G "TGZ;DEB;RPM"
      - name: Verify package artifacts exist
        run: |
          ls build/release/*.tar.gz
          ls build/release/*.deb
          ls build/release/*.rpm
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            build/release/*.tar.gz
            build/release/*.deb
            build/release/*.rpm

  docker-push:
    runs-on: ubuntu-22.04
    needs: package
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - name: Configure + build runtime binary
        run: cmake --preset release && cmake --build --preset release --target boat_gateway
      - name: Verify runtime binary exists for Dockerfile
        run: ls build/release/src/gateway/grpc_gateway/boat_gateway
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-arch runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.runtime
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/boat-platform/boat-platform:${{ github.ref_name }}
            ghcr.io/boat-platform/boat-platform:latest
